services:
  db:
    image: mysql:8.4
    container_name: wedding-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wedding_invitation
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: wedding
      MYSQL_PASSWORD: wedding
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wedding-network

  backend-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedding-backend-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: wedding_invitation
      DB_USERNAME: wedding
      DB_PASSWORD: wedding
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
    networks:
      - wedding-network

  backend-nginx:
    image: nginx:1.27-alpine
    container_name: wedding-backend-nginx
    restart: unless-stopped
    depends_on:
      - backend-app
    ports:
      - "8000:80"
    volumes:
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    networks:
      - wedding-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: wedding-frontend
    restart: unless-stopped
    depends_on:
      - backend-nginx
    ports:
      - "5173:80"
    networks:
      - wedding-network

volumes:
  db_data:

networks:
  wedding-network:
    driver: bridge
